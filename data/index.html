<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Version Data</title>
  <style>
    :root {
      --bg: #061018;
      --bg-accent: #0a1f2e;
      --panel: rgba(11, 27, 40, 0.86);
      --panel-border: rgba(93, 220, 255, 0.28);
      --text: #e7f6ff;
      --muted: #9ac6db;
      --json-bg: #04101a;
      --json-border: #1f455e;
      --highlight: #33d1ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Bai Jamjuree', sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 10% -10%, #114361 0%, transparent 55%),
        radial-gradient(900px 500px at 100% 0%, #0f2d45 0%, transparent 50%),
        linear-gradient(145deg, var(--bg) 0%, var(--bg-accent) 100%);
      padding: 28px 16px;
      position: relative;
      overflow: hidden;
      perspective: 900px;
    }

    body::before {
      content: "";
      position: fixed;
      left: -10%;
      right: -10%;
      top: 34%;
      bottom: -30%;
      pointer-events: none;
      opacity: 0.34;
      background-image:
        linear-gradient(rgba(80, 221, 255, 0.34) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80, 221, 255, 0.28) 1px, transparent 1px);
      background-size: 44px 44px, 44px 44px;
      transform-origin: center top;
      transform: rotateX(68deg) translateY(6%);
      box-shadow: 0 -50px 100px rgba(47, 197, 245, 0.2) inset;
      mask-image: linear-gradient(to top, black 22%, transparent 92%);
      animation: gridDrift 14s linear infinite;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.2;
      background:
        radial-gradient(circle at 50% 70%, rgba(94, 228, 255, 0.25), transparent 56%);
      z-index: 0;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(3px);
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(107, 185, 219, 0.2);
    }

    .logo {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      padding: 4px;
    }

    h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .sub a {
      color: #8be4ff;
      text-decoration: none;
      border-bottom: 1px dotted rgba(139, 228, 255, 0.6);
    }

    .sub a:hover {
      color: #c8f3ff;
      border-bottom-color: rgba(200, 243, 255, 0.9);
    }

    .content {
      padding: 16px 18px 18px;
    }

    pre {
      margin: 0;
      padding: 16px;
      border: 1px solid var(--json-border);
      border-radius: 10px;
      background: var(--json-bg);
      overflow: auto;
      line-height: 1.5;
      color: var(--highlight);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.92rem;
    }

    .footer {
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .footer a {
      color: #8be4ff;
      text-decoration: none;
      border-bottom: 1px dotted rgba(139, 228, 255, 0.6);
    }

    .footer a:hover {
      color: #c8f3ff;
      border-bottom-color: rgba(200, 243, 255, 0.9);
    }

    @media (max-width: 560px) {
      body {
        padding: 16px 10px;
      }

      .header, .content, .footer {
        padding-left: 12px;
        padding-right: 12px;
      }

      .logo {
        width: 38px;
        height: 38px;
      }
    }

    @keyframes gridDrift {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: 0 44px, 44px 0;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <header class="header">
        <img class="logo" src="./logo.png" alt="osctrl logo">
        <div>
          <h1>osctrl Telemetry: version_data.json</h1>
          <p class="sub">Metadata distribution endpoint for <a href="https://osctrl.net/" target="_blank" rel="noopener noreferrer">osctrl.net</a></p>
        </div>
      </header>

      <div class="content">
        <pre id="json-view">Loading...</pre>
      </div>

      <div class="footer">
        Source: <a href="https://github.com/jmpsec/osctrl" target="_blank" rel="noopener noreferrer">https://github.com/jmpsec/osctrl</a>
      </div>
    </section>
  </main>

  <script>
    const view = document.getElementById("json-view");

    fetch("./version_data.json")
      .then((response) => {
        if (!response.ok) {
          throw new Error(`Failed to load JSON (${response.status})`);
        }
        return response.json();
      })
      .then((data) => {
        view.textContent = JSON.stringify(data, null, 2);
      })
      .catch((error) => {
        view.textContent = `Error: ${error.message}`;
      });
  </script>
</body>
</html>
